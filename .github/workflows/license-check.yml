#
# License-Check — REUSE lint for SPDX header consistency.
# wakir-verify is Apache-2.0 throughout (see REUSE.toml).
# This workflow must stay green: any file lacking a SPDX-License-Identifier
# header fails the build.

name: license-check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reuse:
    name: REUSE lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install REUSE
        run: |
          python -m pip install --upgrade pip
          python -m pip install "reuse>=3.0"

      - name: Run reuse lint
        run: reuse lint
